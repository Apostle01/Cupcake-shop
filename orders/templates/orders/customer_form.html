{% extends 'base.html' %}

{% block title %}Add Customer{% endblock %}

{% block content %}
<h1 class="mb-4">Add Customer</h1>
<form method="post" class="needs-validation" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">
        <i class="fas fa-save"></i> Save
    </button>
</form>
{% endblock %}
