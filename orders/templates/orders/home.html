{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container text-center mt-5">
    <!-- Cupcake Logo -->
    <img src="{{ MEDIA_URL }}media/images/cupcake_logo.JPG" alt="Sarah's Cupcakes Logo" class="mb-4" style="max-width: 150px;">

    <h1>Welcome to Sarah's Cupcakes!</h1>
    <p class="lead">Delicious cupcakes delivered fresh to your door.</p>

    <!-- Cupcake Gallery -->
    <div class="row mt-5">
        {% for cupcake in cupcakes %}
        <div class="col-md-4 mb-4">
            <div class="card">
                <!-- Handle missing images gracefully -->
                <img src="{{ MEDIA_URL }}{{ cupcake.image }}" alt="{{ cupcake.flavor }}" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">{{ cupcake.name }}</h5>
                    <p class="card-text">{{ cupcake.description }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
